<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>落ちものよけ — Sのよくわからないもの置き場</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #d0d0d0;
      font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 32px 16px 60px;
    }

    .back-link {
      align-self: flex-start;
      font-size: 13px;
      color: #555;
      text-decoration: none;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
      transition: color 0.15s;
    }
    .back-link:hover { color: #aaa; }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #efefef;
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .desc {
      font-size: 13px;
      color: #555;
      margin-bottom: 24px;
    }

    #game-wrapper {
      position: relative;
    }

    canvas {
      display: block;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      background: #0a0a0a;
    }

    /* オーバーレイ（タイトル・ゲームオーバー画面） */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: rgba(8,8,8,0.92);
      gap: 14px;
      padding: 24px;
    }
    #overlay.hidden { display: none; }

    .overlay-title {
      font-size: 22px;
      font-weight: 700;
      color: #efefef;
    }

    .overlay-score {
      font-size: 14px;
      color: #777;
    }
    .overlay-score span {
      color: #ffffff;
      font-weight: 700;
      font-size: 28px;
    }

    .overlay-best {
      font-size: 13px;
      color: #444;
    }
    .overlay-best span {
      color: #888;
      font-weight: 700;
    }

    #start-btn {
      margin-top: 4px;
      padding: 12px 40px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      letter-spacing: 0.05em;
    }
    #start-btn:hover {
      border-color: #777;
      background: #252525;
    }

    .hint {
      font-size: 12px;
      color: #333;
    }

    /* HUD */
    #hud {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 400px;
      margin-top: 12px;
      font-size: 13px;
      color: #444;
    }
    #hud span { color: #999; font-weight: 700; }

    /* ランキング */
    #ranking-section {
      margin-top: 32px;
      width: 100%;
      max-width: 400px;
    }

    .ranking-title {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: #333;
      text-transform: uppercase;
      padding-bottom: 10px;
      border-bottom: 1px solid #1a1a1a;
      margin-bottom: 12px;
    }

    #ranking-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #ranking-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      padding: 8px 12px;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 6px;
    }

    #ranking-list li.rank-1 { border-color: #5a4a00; background: #141200; }
    #ranking-list li.rank-2 { border-color: #2a2a2a; background: #111; }
    #ranking-list li.rank-3 { border-color: #2a1a00; background: #120e00; }

    .rank-num {
      font-size: 11px;
      color: #333;
      width: 20px;
    }
    .rank-1 .rank-num { color: #b8860b; font-weight: 700; }
    .rank-2 .rank-num { color: #777; font-weight: 700; }
    .rank-3 .rank-num { color: #7a4a00; font-weight: 700; }

    .rank-time {
      font-weight: 700;
      color: #ccc;
      font-size: 15px;
    }
    .rank-1 .rank-time { color: #f0c040; }

    .rank-date {
      font-size: 11px;
      color: #333;
    }

    .rank-empty {
      font-size: 13px;
      color: #333;
      text-align: center;
      padding: 16px;
    }

    /* ランキング内オーバーレイ */
    .new-record-badge {
      font-size: 11px;
      color: #f0c040;
      border: 1px solid #5a4a00;
      border-radius: 4px;
      padding: 2px 8px;
      background: #141200;
    }
  </style>
</head>
<body>

  <a class="back-link" href="https://ssankari1284-ux.github.io">← 戻る</a>

  <h1>落ちものよけ</h1>
  <p class="desc">上から降ってくるブロックをよけ続けろ</p>

  <div id="game-wrapper">
    <canvas id="canvas" width="400" height="520"></canvas>

    <div id="overlay">
      <div class="overlay-title" id="overlay-title">落ちものよけ</div>
      <div class="overlay-score hidden" id="overlay-score">
        <span id="score-val">0.00</span> 秒
      </div>
      <div class="overlay-best hidden" id="overlay-best">ベスト：<span id="best-val">0.00</span> 秒</div>
      <div class="new-record-badge hidden" id="new-record">NEW RECORD</div>
      <button id="start-btn">はじめる</button>
      <div class="hint">← → キー / マウスドラッグ / タッチ で操作</div>
    </div>
  </div>

  <div id="hud">
    <div>時間：<span id="hud-time">0.0</span> 秒</div>
    <div>ベスト：<span id="hud-best">—</span></div>
  </div>

  <div id="ranking-section">
    <div class="ranking-title">Ranking — このブラウザのトップ10</div>
    <ul id="ranking-list">
      <li class="rank-empty" style="border:none;background:none;">まだ記録がありません</li>
    </ul>
  </div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  const overlay      = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlayScore = document.getElementById('overlay-score');
  const overlayBest  = document.getElementById('overlay-best');
  const scoreVal     = document.getElementById('score-val');
  const bestVal      = document.getElementById('best-val');
  const newRecord    = document.getElementById('new-record');
  const startBtn     = document.getElementById('start-btn');
  const hudTime      = document.getElementById('hud-time');
  const hudBest      = document.getElementById('hud-best');

  // ---- ランキング ----
  const RANKING_KEY = 'dodge_ranking_v1';

  function loadRanking() {
    try { return JSON.parse(localStorage.getItem(RANKING_KEY)) || []; }
    catch { return []; }
  }

  function saveRanking(list) {
    localStorage.setItem(RANKING_KEY, JSON.stringify(list));
  }

  function addScore(seconds) {
    const list = loadRanking();
    const now = new Date();
    const dateStr = `${now.getMonth()+1}/${now.getDate()}`;
    list.push({ time: seconds, date: dateStr });
    list.sort((a, b) => b.time - a.time);
    const top10 = list.slice(0, 10);
    saveRanking(top10);
    return top10;
  }

  function renderRanking(highlightTime) {
    const list = loadRanking();
    const ul = document.getElementById('ranking-list');
    ul.innerHTML = '';

    if (list.length === 0) {
      ul.innerHTML = '<li class="rank-empty" style="border:none;background:none;">まだ記録がありません</li>';
      return;
    }

    const medals = ['1st', '2nd', '3rd'];
    list.forEach((entry, i) => {
      const li = document.createElement('li');
      if (i < 3) li.classList.add(`rank-${i+1}`);

      const isNew = highlightTime !== null && Math.abs(entry.time - highlightTime) < 0.001 && i === list.findIndex(e => Math.abs(e.time - highlightTime) < 0.001);

      li.innerHTML = `
        <span class="rank-num">${medals[i] || (i+1)}</span>
        <span class="rank-time">${entry.time.toFixed(2)} 秒</span>
        <span class="rank-date">${isNew ? '<span style="color:#f0c040;font-size:11px;">NEW</span>' : entry.date}</span>
      `;
      ul.appendChild(li);
    });
  }

  // ---- ゲーム定数 ----
  const PLAYER_W = 52;
  const PLAYER_H = 14;
  const PLAYER_Y = H - 52;
  const PLAYER_SPEED = 6;
  const BLOCK_W = 48;
  const BLOCK_H = 20;

  // ブロックの色リスト
  const BLOCK_COLORS = [
    { fill: '#e53935', stroke: '#ff6659' }, // 赤
    { fill: '#fb8c00', stroke: '#ffbd45' }, // オレンジ
    { fill: '#8e24aa', stroke: '#c158dc' }, // 紫
    { fill: '#1e88e5', stroke: '#6ab7ff' }, // 青
    { fill: '#00897b', stroke: '#4ebaaa' }, // 緑
  ];

  let player, blocks, keys, startTime, animId, alive;
  let lastSpawnTime = 0;

  function init() {
    player    = { x: W / 2 - PLAYER_W / 2, y: PLAYER_Y };
    blocks    = [];
    keys      = { left: false, right: false };
    startTime = performance.now();
    alive     = true;
    lastSpawnTime = 0;
  }

  function elapsed(now) {
    return (now - startTime) / 1000;
  }

  function spawnInterval(t) {
    return Math.max(350, 1100 - t * 28);
  }

  function blockSpeed(t) {
    return 3.5 + t * 0.2;
  }

  function spawnBlock(now, t) {
    if (now - lastSpawnTime > spawnInterval(t)) {
      const cols = 5;
      const col  = Math.floor(Math.random() * cols);
      const x    = col * (W / cols) + (W / cols - BLOCK_W) / 2;
      const color = BLOCK_COLORS[Math.floor(Math.random() * BLOCK_COLORS.length)];
      blocks.push({ x, y: -BLOCK_H, color });
      lastSpawnTime = now;
    }
  }

  function update(now) {
    const t = elapsed(now);

    if (keys.left)  player.x -= PLAYER_SPEED;
    if (keys.right) player.x += PLAYER_SPEED;
    player.x = Math.max(0, Math.min(W - PLAYER_W, player.x));

    const spd = blockSpeed(t);
    for (const b of blocks) b.y += spd;
    blocks = blocks.filter(b => b.y < H + BLOCK_H + 10);

    spawnBlock(now, t);

    // 衝突判定
    for (const b of blocks) {
      if (
        player.x < b.x + BLOCK_W - 4 &&
        player.x + PLAYER_W > b.x + 4 &&
        player.y < b.y + BLOCK_H - 2 &&
        player.y + PLAYER_H > b.y + 2
      ) {
        alive = false;
      }
    }
  }

  function draw(now) {
    ctx.clearRect(0, 0, W, H);

    // 縦ライン（レーン区切り）
    ctx.strokeStyle = '#151515';
    ctx.lineWidth = 1;
    for (let i = 1; i < 5; i++) {
      const x = i * (W / 5);
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }

    // ブロック
    for (const b of blocks) {
      ctx.fillStyle = b.color.fill;
      ctx.beginPath();
      ctx.roundRect(b.x, b.y, BLOCK_W, BLOCK_H, 5);
      ctx.fill();

      // ハイライト（光沢感）
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.beginPath();
      ctx.roundRect(b.x + 4, b.y + 3, BLOCK_W - 8, 5, 2);
      ctx.fill();

      ctx.strokeStyle = b.color.stroke;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(b.x, b.y, BLOCK_W, BLOCK_H, 5);
      ctx.stroke();
    }

    // プレイヤー
    const px = player.x, py = player.y;
    // 影
    ctx.fillStyle = 'rgba(200,240,255,0.08)';
    ctx.beginPath();
    ctx.roundRect(px + 4, py + 6, PLAYER_W - 8, 10, 4);
    ctx.fill();
    // 本体
    ctx.fillStyle = '#e0f0ff';
    ctx.beginPath();
    ctx.roundRect(px, py, PLAYER_W, PLAYER_H, 5);
    ctx.fill();
    // 光沢
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.roundRect(px + 6, py + 3, PLAYER_W - 12, 4, 2);
    ctx.fill();

    // 時間表示
    const t = elapsed(now);
    ctx.fillStyle = '#444';
    ctx.font = '12px Meiryo, sans-serif';
    ctx.fillText(t.toFixed(1) + ' s', 10, 20);
  }

  function loop(now) {
    update(now);
    draw(now);

    const t = elapsed(now);
    hudTime.textContent = t.toFixed(1);

    if (!alive) {
      gameOver(t);
      return;
    }
    animId = requestAnimationFrame(loop);
  }

  function gameOver(t) {
    const list = loadRanking();
    const prevBest = list.length > 0 ? list[0].time : 0;
    addScore(t);
    renderRanking(t);

    const isNewRecord = t > prevBest || list.length === 0;

    overlayTitle.textContent = 'ゲームオーバー';
    overlayScore.classList.remove('hidden');
    scoreVal.textContent = t.toFixed(2);

    const best = loadRanking()[0].time;
    overlayBest.classList.remove('hidden');
    bestVal.textContent = best.toFixed(2);
    hudBest.textContent = best.toFixed(1) + ' 秒';

    if (isNewRecord) {
      newRecord.classList.remove('hidden');
    } else {
      newRecord.classList.add('hidden');
    }

    startBtn.textContent = 'もう一度';
    overlay.classList.remove('hidden');
  }

  function startGame() {
    overlay.classList.add('hidden');
    cancelAnimationFrame(animId);
    newRecord.classList.add('hidden');
    init();
    animId = requestAnimationFrame(loop);

    const list = loadRanking();
    if (list.length > 0) {
      hudBest.textContent = list[0].time.toFixed(1) + ' 秒';
    }
  }

  // 初期ランキング表示
  renderRanking(null);
  const initList = loadRanking();
  if (initList.length > 0) {
    hudBest.textContent = initList[0].time.toFixed(1) + ' 秒';
  }

  startBtn.addEventListener('click', startGame);

  // キーボード
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  { e.preventDefault(); keys.left  = true; }
    if (e.key === 'ArrowRight') { e.preventDefault(); keys.right = true; }
  });
  document.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft')  keys.left  = false;
    if (e.key === 'ArrowRight') keys.right = false;
  });

  // タッチ操作
  let touchStartX = null;
  canvas.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    if (touchStartX === null) return;
    const dx = e.touches[0].clientX - touchStartX;
    player.x += dx * 1.4;
    player.x = Math.max(0, Math.min(W - PLAYER_W, player.x));
    touchStartX = e.touches[0].clientX;
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchend', () => { touchStartX = null; });

  // マウスドラッグ
  let mouseDown = false, lastMouseX = null;
  canvas.addEventListener('mousedown', e => { mouseDown = true; lastMouseX = e.clientX; });
  document.addEventListener('mouseup',   () => { mouseDown = false; lastMouseX = null; });
  document.addEventListener('mousemove', e => {
    if (!mouseDown || lastMouseX === null) return;
    const dx = e.clientX - lastMouseX;
    player.x += dx * 1.4;
    player.x = Math.max(0, Math.min(W - PLAYER_W, player.x));
    lastMouseX = e.clientX;
  });
</script>
</body>
</html>
