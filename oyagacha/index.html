<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #fdf4ff;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 16px 80px;
      overflow-x: hidden;
    }
    .container { max-width: 560px; width: 100%; position: relative; }

    .header { text-align: center; margin-bottom: 40px; }
    .header-badge {
      display: inline-block; font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.2em; color: #9333ea;
      background: #f3e8ff; border-radius: 20px;
      padding: 4px 14px; margin-bottom: 16px;
    }
    h1 { font-size: 1.5rem; font-weight: 800; line-height: 1.55; margin-bottom: 10px; color: #1a1a2e; }
    .subtitle { font-size: 0.85rem; color: #9ca3af; line-height: 1.75; }

    .progress-wrap { margin-bottom: 28px; }
    .progress-bar { height: 6px; background: #f3e8ff; border-radius: 6px; overflow: hidden; }
    .progress-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, #f472b6, #fb923c, #fbbf24, #34d399, #60a5fa, #a855f7);
      border-radius: 6px;
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    }

    .question-card {
      background: #ffffff;
      border: 2px solid #f3e8ff;
      border-radius: 24px; padding: 28px 24px;
      box-shadow: 0 8px 32px rgba(168, 85, 247, 0.1);
    }
    .question-num { font-size: 0.72rem; letter-spacing: 0.1em; color: #a855f7; margin-bottom: 10px; font-weight: 700; }
    .question-text { font-size: 1.05rem; font-weight: 600; line-height: 1.75; margin-bottom: 22px; color: #1a1a2e; }
    .chara { text-align: center; margin-bottom: 20px; }
    .chara-face {
      display: inline-block; width: 64px; height: 64px;
      background: linear-gradient(145deg, #fce7f3, #ede9fe);
      border-radius: 50%; border: 3px solid #f9a8d4;
      position: relative; transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), border-color 0.25s, background 0.25s;
    }
    .chara.happy .chara-face { transform: scale(1.1); border-color: #f472b6; }
    .chara.sad   .chara-face { transform: scale(0.95); border-color: #a5b4fc; background: linear-gradient(145deg, #e0e7ff, #ede9fe); }
    .chara-face::before, .chara-face::after {
      content: ''; position: absolute;
      width: 13px; height: 8px; background: #fb7185;
      border-radius: 50%; top: 36px; opacity: 0; transition: opacity 0.25s;
    }
    .chara-face::before { left: 5px; }
    .chara-face::after  { right: 5px; }
    .chara.happy .chara-face::before,
    .chara.happy .chara-face::after { opacity: 0.55; }
    .chara-eye {
      position: absolute; width: 9px; height: 9px;
      background: #1a1a2e; border-radius: 50%; top: 22px;
      transition: all 0.25s;
    }
    .chara-eye.left  { left: 14px; }
    .chara-eye.right { right: 14px; }
    .chara.happy .chara-eye { height: 5px; border-radius: 5px 5px 0 0; top: 24px; }
    .chara.sad .chara-eye.left  { transform: rotate(12deg); top: 25px; }
    .chara.sad .chara-eye.right { transform: rotate(-12deg); top: 25px; }
    .chara-mouth {
      position: absolute; bottom: 13px;
      left: 50%; transform: translateX(-50%);
      width: 18px; height: 0;
      border-bottom: 3px solid #1a1a2e;
      transition: all 0.25s;
    }
    .chara.happy .chara-mouth {
      width: 24px; height: 12px;
      border: 3px solid #1a1a2e; border-top: none;
      border-radius: 0 0 24px 24px; bottom: 11px;
    }
    .chara.sad .chara-mouth {
      width: 18px; height: 9px;
      border: 3px solid #1a1a2e; border-bottom: none;
      border-radius: 9px 9px 0 0; bottom: 9px;
    }

    .branch-hint {
      display: none; font-size: 0.73rem; color: #92400e;
      margin-top: -14px; margin-bottom: 18px;
      padding: 6px 12px; background: #fef9c3;
      border-radius: 8px; border-left: 3px solid #fbbf24;
    }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option-btn {
      background: #ffffff; border: 2px solid #e9d5ff;
      color: #374151; padding: 13px 18px; border-radius: 50px;
      font-size: 0.92rem; text-align: left; cursor: pointer;
      transition: all 0.15s ease;
    }
    .option-btn:hover:not(:disabled) { border-color: #a855f7; background: #faf5ff; color: #6b21a8; }
    .option-btn.selected { background: #f3e8ff; border-color: #a855f7; color: #6b21a8; font-weight: 600; }
    .option-btn:disabled { cursor: default; opacity: 0.5; }

    #loading-screen { display: none; text-align: center; padding: 60px 0; }
    .loading-icon {
      width: 56px; height: 56px;
      border: 3px solid #f3e8ff; border-top-color: #a855f7;
      border-radius: 50%; margin: 0 auto 24px; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; color: #1a1a2e; }
    .loading-status { font-size: 0.82rem; color: #9ca3af; margin-bottom: 28px; min-height: 20px; transition: opacity 0.3s; }
    .loading-bar-wrap { height: 6px; background: #f3e8ff; border-radius: 6px; overflow: hidden; max-width: 300px; margin: 0 auto; }
    .loading-bar-fill {
      height: 100%; border-radius: 6px; width: 0%; transition: width 0.4s ease;
      background: linear-gradient(90deg, #f472b6, #fb923c, #fbbf24, #34d399, #60a5fa, #a855f7);
    }

    #result-screen { display: none; }
    .result-flash { position: fixed; inset: 0; opacity: 0; pointer-events: none; z-index: 100; transition: opacity 0.1s; }

    .result-hero {
      text-align: center; background: #ffffff;
      border: 2px solid #f3e8ff;
      border-radius: 28px; padding: 40px 24px 32px; margin-bottom: 14px;
      position: relative; overflow: hidden;
      box-shadow: 0 8px 32px rgba(168, 85, 247, 0.12);
    }
    .result-glow {
      position: absolute; top: -80px; left: 50%; transform: translateX(-50%);
      width: 400px; height: 400px; border-radius: 50%;
      opacity: 0.15; filter: blur(80px); pointer-events: none;
    }
    .result-label { font-size: 0.72rem; letter-spacing: 0.2em; color: #9ca3af; margin-bottom: 16px; font-weight: 700; }
    .result-score { font-size: 6.5rem; font-weight: 800; line-height: 1; margin-bottom: 12px; font-variant-numeric: tabular-nums; position: relative; }
    .result-rank-badge {
      display: none; font-size: 0.82rem; font-weight: 800;
      letter-spacing: 0.15em; color: #fff; border-radius: 50px;
      padding: 6px 22px; margin-bottom: 16px;
      animation: badgePop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    @keyframes badgePop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .result-message { font-size: 0.88rem; color: #6b7280; line-height: 1.8; max-width: 360px; margin: 0 auto; }
    .result-percentile { font-size: 0.78rem; color: #9ca3af; margin-top: 10px; }

    .summary-card {
      background: #ffffff; border: 2px solid #f3e8ff;
      border-radius: 20px; padding: 20px 24px; margin-bottom: 14px;
      box-shadow: 0 4px 16px rgba(168, 85, 247, 0.07);
    }
    .summary-title { font-size: 0.7rem; letter-spacing: 0.15em; color: #9ca3af; margin-bottom: 12px; font-weight: 700; }
    .summary-text { font-size: 0.9rem; color: #374151; line-height: 1.85; }

    .breakdown {
      background: #ffffff; border: 2px solid #f3e8ff;
      border-radius: 20px; padding: 22px 24px; margin-bottom: 14px;
      box-shadow: 0 4px 16px rgba(168, 85, 247, 0.07);
    }
    .breakdown-title { font-size: 0.7rem; letter-spacing: 0.15em; color: #9ca3af; margin-bottom: 18px; font-weight: 700; }
    .breakdown-row { margin-bottom: 15px; }
    .breakdown-row:last-child { margin-bottom: 0; }
    .breakdown-meta { display: flex; justify-content: space-between; font-size: 0.82rem; color: #9ca3af; margin-bottom: 7px; }
    .breakdown-meta strong { color: #374151; }
    .bar-bg { height: 8px; background: #faf5ff; border-radius: 8px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 8px; transition: width 0.9s cubic-bezier(0.4,0,0.2,1); }
    #eco-bar { background: linear-gradient(90deg, #f472b6, #fb7185); }
    #cul-bar { background: linear-gradient(90deg, #fbbf24, #fb923c); }
    #fam-bar { background: linear-gradient(90deg, #34d399, #06b6d4); }
    #gen-bar { background: linear-gradient(90deg, #818cf8, #a855f7); }

    .result-actions { display: flex; gap: 10px; }
    .share-btn {
      flex: 1; background: linear-gradient(135deg, #f472b6, #a855f7);
      color: #fff; border: none; padding: 15px 20px; border-radius: 50px;
      font-size: 0.95rem; font-weight: 800; cursor: pointer; transition: opacity 0.15s;
      box-shadow: 0 6px 20px rgba(168, 85, 247, 0.3);
    }
    .share-btn:hover { opacity: 0.88; }
    .retry-btn {
      background: #ffffff; color: #9ca3af; border: 2px solid #e9d5ff;
      padding: 15px 20px; border-radius: 50px; font-size: 0.9rem;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .retry-btn:hover { color: #6b21a8; border-color: #a855f7; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.3s ease forwards; }

    @keyframes shake {
      0%,100% { transform: translateX(0); } 15% { transform: translateX(-8px); }
      30% { transform: translateX(8px); }   45% { transform: translateX(-6px); }
      60% { transform: translateX(6px); }   75% { transform: translateX(-3px); }
      90% { transform: translateX(3px); }
    }
    .shake { animation: shake 0.6s ease 0.8s both; }

    .particle {
      position: fixed; pointer-events: none; z-index: 200;
      border-radius: 50%; animation: particleFall linear forwards;
    }
    @keyframes particleFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

    @media (max-width: 480px) {
      body { padding: 28px 12px 56px; }
      h1 { font-size: 1.25rem; }
      .subtitle { font-size: 0.8rem; }
      .question-card { padding: 22px 16px; border-radius: 20px; }
      .question-text { font-size: 0.98rem; margin-bottom: 18px; }
      .option-btn { padding: 14px 16px; font-size: 0.88rem; }
      .result-score { font-size: 4.8rem; }
      .result-hero { padding: 32px 16px 26px; border-radius: 22px; }
      .result-message { font-size: 0.84rem; }
      .summary-card, .breakdown { padding: 18px 16px; }
      .summary-text { font-size: 0.86rem; }
      .share-btn, .retry-btn { padding: 14px 14px; font-size: 0.88rem; }
      .chara-face { width: 56px; height: 56px; }
      .chara-eye { top: 19px; }
      .chara-eye.left  { left: 12px; }
      .chara-eye.right { right: 12px; }
      .chara-face::before { top: 32px; left: 4px; }
      .chara-face::after  { top: 32px; right: 4px; }
      .chara-mouth { bottom: 11px; }
      .chara.happy .chara-mouth { bottom: 9px; }
      .chara.sad   .chara-mouth { bottom: 7px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="result-flash" id="result-flash"></div>

  <div id="quiz-area">
    <div class="header">
      <div class="header-badge">DATA-DRIVEN DIAGNOSIS</div>

      <div class="chara" id="chara">
        <div class="chara-face">

          <div class="chara-eye right"></div>

      <div class="question-num" id="question-num">Q1</div>
      <div class="question-text" id="question-text"></div>
      <div class="branch-hint" id="branch-hint"></div>
      <div class="options" id="options"></div>

  </div>

  <div id="loading-screen">
    <div class="loading-icon"></div>
    <div class="loading-title">解析中...</div>

    <div class="loading-bar-wrap"><div class="loading-bar-fill" id="loading-bar"></div></div>
  </div>

  <div id="result-screen">
    <div class="result-hero" id="result-hero">

    <div class="summary-card">
      <div class="summary-title">PROFILE SUMMARY</div>
      <p class="summary-text" id="summary-text"></p>

    <div class="breakdown">
      <div class="breakdown-title">CATEGORY BREAKDOWN</div>
      <div class="breakdown-row">
        <div class="breakdown-meta"><strong>経済資本</strong><span id="eco-pct">0%</span></div>
        <div class="bar-bg"><div class="bar-fill" id="eco-bar" style="width:0%"></div></div>
      </div>
      <div class="breakdown-row">
        <div class="breakdown-meta"><strong>文化・地域</strong><span id="cul-pct">0%</span></div>
        <div class="bar-bg"><div class="bar-fill" id="cul-bar" style="width:0%"></div></div>
      </div>
      <div class="breakdown-row">
        <div class="breakdown-meta"><strong>家族・環境</strong><span id="fam-pct">0%</span></div>
        <div class="bar-bg"><div class="bar-fill" id="fam-bar" style="width:0%"></div></div>
      </div>
      <div class="breakdown-row">
        <div class="breakdown-meta"><strong>遺伝・身体</strong><span id="gen-pct">0%</span></div>
        <div class="bar-bg"><div class="bar-fill" id="gen-bar" style="width:0%"></div></div>
      </div>
    </div>
    <div class="result-actions">
      <button class="share-btn" onclick="shareResult()">Xでシェアする</button>
      <button class="retry-btn" onclick="retryQuiz()">もう一度</button>
    </div>
  </div>
</div>

<script>
const SITE_URL = 'https://ssankari1284-ux.github.io/oyagacha/';

const qGraph = {
  // ── 旅行 ──────────────────────────────────────
  q1: {
    text: "子供のころ、家族旅行は年に何回くらい行きましたか？",
    cat: 'eco', max: 10,

let currentId = 'q1';
let answeredData = [];
let questionCount = 0;

function renderQuestion(id) {
  const q = qGraph[id];
  document.getElementById('chara').className = 'chara';
  const card = document.getElementById('question-card');
  card.classList.remove('fade-up');
  void card.offsetWidth;
  card.classList.add('fade-up');

  questionCount++;
  document.getElementById('question-num').textContent = `Q${questionCount}`;
  document.getElementById('question-text').textContent = q.text;

  const hintEl = document.getElementById('branch-hint');
  if (q.hint) { hintEl.textContent = '— 詳細スコアを算出しています'; hintEl.style.display = 'block'; }
  else { hintEl.style.display = 'none'; }

  document.getElementById('options').innerHTML = q.opts.map(opt =>
    `<button class="option-btn" onclick="selectOption(this,${opt.score},'${opt.next}')">${opt.label}</button>`
  ).join('');

  const pct = Math.min(99, Math.round((questionCount / 24) * 100));
  document.getElementById('progress-bar').style.width = `${pct}%`;
}

function selectOption(btn, score, nextId) {
  document.querySelectorAll('.option-btn').forEach(b => { b.disabled = true; });
  btn.classList.add('selected');
  const ratio = score / qGraph[currentId].max;
  document.getElementById('chara').className = ratio >= 0.65 ? 'chara happy' : ratio < 0.3 ? 'chara sad' : 'chara';
  answeredData.push({ cat: qGraph[currentId].cat, score, max: qGraph[currentId].max });
  currentId = nextId === 'null' ? null : nextId;
  setTimeout(() => {
    if (currentId) renderQuestion(currentId);
    else startLoading();
  }, 420);
}

function startLoading() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('loading-screen').style.display = 'block';
  const statuses = ['経済資本を分析中...','家族環境を評価中...','遺伝的要因を算出中...','地域・文化格差を計算中...','偏差値を生成中...'];
  let i = 0;
  const statusEl = document.getElementById('loading-status');
  const barEl = document.getElementById('loading-bar');
  statusEl.textContent = statuses[0];
  barEl.style.width = '10%';
  const iv = setInterval(() => {
    i++;
    if (i < statuses.length) {
      statusEl.style.opacity = '0';
      setTimeout(() => { statusEl.textContent = statuses[i]; statusEl.style.opacity = '1'; }, 150);
      barEl.style.width = `${(i / statuses.length) * 100}%`;
    } else {
      clearInterval(iv);
      barEl.style.width = '100%';
      setTimeout(showResult, 500);
    }
  }, 500);
}

function calcDeviation(totalScore, totalMax) {
  const pct = totalScore / totalMax;
  const mean = 0.55, sd = 0.15;
  return Math.max(20, Math.round(((pct - mean) / sd * 10 + 50) * 10) / 10);
}

function getRankKey(d) {
  for (const [key, r] of Object.entries(RANKS)) { if (d >= r.min) return key; }
  return 'D';
}

function countUp(el, target, duration) {
  const start = performance.now();
  function step(now) {
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    el.textContent = (ease * target).toFixed(1);
    if (p < 1) requestAnimationFrame(step);
    else el.textContent = target.toFixed(1);
  }
  requestAnimationFrame(step);
}

function spawnParticles(color) {
  const colors = [color, '#f472b6', '#fbbf24', '#34d399', '#60a5fa', '#fff'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${4+Math.random()*6}px;height:${4+Math.random()*6}px;animation-duration:${1.5+Math.random()*2}s`;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 3500);
    }, i * 40);
  }
}

function showResult() {
  const totalScore = answeredData.reduce((s, d) => s + d.score, 0);
  const totalMax   = answeredData.reduce((s, d) => s + d.max, 0);
  const deviation  = calcDeviation(totalScore, totalMax);
  const rankKey    = getRankKey(deviation);
  const rank       = RANKS[rankKey];

  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const flash = document.getElementById('result-flash');
  flash.style.background = rank.color;
  flash.style.opacity = '0.25';
  setTimeout(() => { flash.style.opacity = '0'; }, 200);

  document.getElementById('result-glow').style.background = rank.color;
  const scoreEl = document.getElementById('result-score');
  scoreEl.style.color = rank.color;

  const badge = document.getElementById('result-rank-badge');
  badge.textContent = `ランク ${rank.label}`;
  badge.style.background = rank.color;
  setTimeout(() => { badge.style.display = 'inline-block'; }, 800);

  document.getElementById('result-message').textContent = rank.message;
  document.getElementById('result-percentile').textContent = `回答者の${rank.percentile}に相当します`;

  countUp(scoreEl, deviation, 1400);

  if (rankKey === 'SSR' || rankKey === 'SR') setTimeout(() => spawnParticles(rank.color), 600);
  if (rankKey === 'D') setTimeout(() => { document.getElementById('result-hero').classList.add('shake'); }, 800);

  const catScores = { eco: 0, cul: 0, fam: 0, gen: 0 };
  const catMax    = { eco: 0, cul: 0, fam: 0, gen: 0 };
  answeredData.forEach(d => { catScores[d.cat] += d.score; catMax[d.cat] += d.max; });

  setTimeout(() => {
    const pcts = {};
    ['eco','cul','fam','gen'].forEach(key => {
      const pct = catMax[key] ? Math.round((catScores[key] / catMax[key]) * 100) : 0;
      pcts[key] = pct;
      document.getElementById(`${key}-pct`).textContent = `${pct}%`;
      document.getElementById(`${key}-bar`).style.width = `${pct}%`;
    });
    document.getElementById('summary-text').textContent = generateSummary(pcts);
  }, 300);
}

function generateSummary(s) {
  const L = { eco: '経済資本', cul: '文化・地域', fam: '家族・環境', gen: '遺伝・身体' };
  const H = 65, LOW = 38;
  const all = Object.entries(s).map(([k, v]) => ({ k, label: L[k], v })).sort((a, b) => b.v - a.v);
  const highs = all.filter(e => e.v >= H);
  const lows  = all.filter(e => e.v <  LOW);

  if (highs.length === 4) return '全カテゴリが平均を上回っている。スタート地点としては統計的に有利だった。';
  if (lows.length  === 4) return '全カテゴリが平均を下回っている。このデータが示すのは事実であり、評価ではない。';

  if (highs.length >= 2 && lows.length === 0)
    return `${highs.map(e => e.label).join('・')}が高水準で、全体的に恵まれた環境だった。`;
  if (lows.length >= 2 && highs.length === 0)
    return `${lows.map(e => e.label).join('・')}が平均を大きく下回っており、複数のハンデを背負ったスタートだった。`;
  if (highs.length > 0 && lows.length > 0)
    return `${highs.map(e => e.label).join('・')}は恵まれていたが、${lows.map(e => e.label).join('・')}では平均を下回っている。`;

  const top = all[0], bot = all[all.length - 1];
  return `${top.label}が相対的に高く、${bot.label}がやや低い。全体としては平均的な環境だった。`;
}

  const bottom = cats[cats.length - 1];
  const urlLine = SITE_URL ? `\n\nあなたは？ → ${SITE_URL}` : '\n\nあなたは？';
  const text = `親ガチャ偏差値：${score}（${rank}）\n\n強み：${top.name}（${top.val}%）\n弱み：${bottom.name}（${bottom.val}%）${urlLine}\n\n#親ガチャ偏差値`;
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
}

function retryQuiz() {
  currentId = 'q1'; answeredData = []; questionCount = 0;
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('result-screen').style.display = 'none';
  renderQuestion('q1');
}

renderQuestion('q1');
</script>
